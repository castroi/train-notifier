name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint + format check (Biome)
        run: npm run lint

      - name: Typecheck (tsc, no emit)
        run: npm run typecheck

      - name: Tests (node:test)
        run: npm test

  docker:
    name: build armv7 image (Raspberry Pi target)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Emulate arm/v7 so the Pi image is validated in CI.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Build (linux/arm/v7, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7
          push: false
          tags: train-notifier:ci
